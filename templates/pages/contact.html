{% extends "base.html" %}{% block title %}Contact Us{% endblock %}{% block content %}<div class="max-w-2xl mx-auto px-4 py-16"><h1 class="section-heading mb-8">Contact Us</h1><form method="post" class="space-y-4">{% csrf_token %}<input name="name" placeholder="Your Name" class="w-full border px-4 py-3 rounded focus:ring-2 focus:ring-[#1a5c38] focus:outline-none"/><input name="email" type="email" placeholder="Email" class="w-full border px-4 py-3 rounded focus:ring-2 focus:ring-[#1a5c38] focus:outline-none"/><input name="subject" placeholder="Subject" class="w-full border px-4 py-3 rounded focus:ring-2 focus:ring-[#1a5c38] focus:outline-none"/><textarea name="message" rows="5" placeholder="Message" class="w-full border px-4 py-3 rounded focus:ring-2 focus:ring-[#1a5c38] focus:outline-none"></textarea><button type="submit" class="btn-primary">Send Message</button></form></div>{% endblock %}
