{% extends "base.html" %}{% block title %}Gallery{% endblock %}{% block content %}<div class="max-w-7xl mx-auto px-4 py-16"><h1 class="section-heading mb-8">Gallery</h1><div class="grid grid-cols-2 md:grid-cols-3 gap-4">{% for album in albums %}<a href="/gallery/{{ album.pk }}/" class="card block bg-white border p-4"><p class="font-bold text-[#1a5c38]">{{ album.title }}</p><p class="text-sm text-gray-500 mt-1">{{ album.photos.count }} photo{{ album.photos.count|pluralize }}</p></a>{% empty %}<p class="text-gray-500 col-span-3">No albums yet.</p>{% endfor %}</div></div>{% endblock %}
