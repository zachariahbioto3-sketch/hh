{% extends "base.html" %}{% block title %}{{ album.title }}{% endblock %}{% block content %}<div class="max-w-7xl mx-auto px-4 py-16"><h1 class="section-heading mb-8">{{ album.title }}</h1><div class="grid grid-cols-2 md:grid-cols-3 gap-4">{% for photo in album.photos.all %}<div class="card"><img src="{{ photo.image.url }}" alt="{{ photo.caption }}" class="w-full h-48 object-cover"/>{% if photo.caption %}<p class="p-2 text-sm text-gray-500">{{ photo.caption }}</p>{% endif %}</div>{% endfor %}</div></div>{% endblock %}
