{% extends "base.html" %}{% block title %}{{ post.title }}{% endblock %}{% block content %}<div class="max-w-3xl mx-auto px-4 py-16">{% if post.cover_image %}<img src="{{ post.cover_image.url }}" class="w-full h-64 object-cover rounded-lg mb-8"/>{% endif %}<span class="section-eyebrow">{{ post.get_category_display }}</span><h1 class="section-heading mt-2">{{ post.title }}</h1><p class="text-gray-400 text-sm mt-2">{{ post.published_at|date:"d M Y" }}</p><div class="mt-8 prose max-w-none text-gray-700">{{ post.body }}</div></div>{% endblock %}
