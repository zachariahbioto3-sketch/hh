{% extends "base.html" %}{% block title %}News{% endblock %}{% block content %}<div class="max-w-7xl mx-auto px-4 py-16"><h1 class="section-heading mb-8">News</h1><div class="grid grid-cols-1 md:grid-cols-3 gap-6">{% for p in posts %}<a href="/news/{{ p.slug }}/" class="card block bg-white border"><div class="p-5"><span class="text-xs text-[#e8a020] font-semibold uppercase">{{ p.get_category_display }}</span><h3 class="font-bold text-lg mt-1">{{ p.title }}</h3><p class="text-sm text-gray-500 mt-2">{{ p.excerpt }}</p></div></a>{% empty %}<p class="text-gray-500">No posts yet.</p>{% endfor %}</div></div>{% endblock %}
