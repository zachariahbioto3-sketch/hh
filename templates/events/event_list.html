{% extends "base.html" %}{% block title %}Events{% endblock %}{% block content %}<div class="max-w-7xl mx-auto px-4 py-16"><h1 class="section-heading mb-8">Events</h1><div class="grid grid-cols-1 md:grid-cols-3 gap-6">{% for e in events %}<a href="/events/{{ e.slug }}/" class="card block bg-white border p-5"><p class="text-xs text-[#e8a020] font-semibold">{{ e.start_datetime|date:"d M Y" }}</p><h3 class="font-bold text-lg mt-1">{{ e.title }}</h3><p class="text-sm text-gray-500 mt-1">{{ e.venue }}</p></a>{% empty %}<p class="text-gray-500 col-span-3">No events yet.</p>{% endfor %}</div></div>{% endblock %}
