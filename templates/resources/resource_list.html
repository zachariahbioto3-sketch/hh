{% extends "base.html" %}
{% block title %}Resources{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto px-4 py-20">
  <h1 class="text-2xl text-gray-500 mb-12 text-center">Document Library. <span class="font-bold text-[#1e1e1e] border-b-2 border-[#e8a020] pb-1">Resources</span></h1>
  <div class="space-y-4 max-w-4xl mx-auto">
    {% for r in resources %}
    <a href="/resources/{{ r.pk }}/" class="flex items-center justify-between border border-gray-200 bg-white p-6 hover:border-[#1e1e1e] transition-colors group">
      <div>
        <p class="font-bold text-[#1e1e1e] text-lg">{{ r.title }}</p>
        <p class="text-xs text-[#e8a020] uppercase font-bold tracking-wider mt-1">{{ r.get_category_display }}</p>
      </div>
      <span class="text-gray-400 group-hover:text-[#1e1e1e] transition-colors">➔</span>
    </a>
    {% empty %}
    <p class="text-gray-500 text-center py-8">No resources yet.</p>
    {% endfor %}
  </div>
</div>
{% endblock %}
