{% extends "base.html" %}
{% block title %}{{ resource.title }}{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-20 text-center">
  <h1 class="font-[Playfair_Display] text-4xl font-bold text-[#1e1e1e] mb-4">{{ resource.title }}</h1>
  <p class="text-gray-500 mb-8">{{ resource.description }}</p>
  <a href="{{ resource.file.url }}" class="inline-block bg-[#e8a020] text-white text-xs font-bold px-8 py-3 uppercase tracking-widest hover:bg-[#1e1e1e] transition">Download File</a>
</div>
{% endblock %}
