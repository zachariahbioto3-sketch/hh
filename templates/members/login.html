{% extends "base.html" %}
{% block title %}Member Login — KAFUOSA{% endblock %}
{% block content %}

<div class="max-w-xl mx-auto px-8 py-16">
  <div class="font-mono text-xs tracking-widest text-teal uppercase mb-5">Membership</div>
  <h1 class="font-display text-4xl text-ink mb-8">Member Login</h1>

  {% if messages %}
    {% for message in messages %}
      <div class="bg-red-600 text-white px-4 py-3 rounded-xl text-sm mb-4">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <form method="post" class="flex flex-col gap-4">
    {% csrf_token %}
    <label class="text-sm text-muted flex flex-col gap-2">
      Username
      <input type="text" name="username" class="font-sans text-[15px] px-3.5 py-3 rounded-xl border border-paperdim bg-white text-ink focus:outline-none focus:border-teal">
    </label>
    <label class="text-sm text-muted flex flex-col gap-2">
      Password
      <input type="password" name="password" class="font-sans text-[15px] px-3.5 py-3 rounded-xl border border-paperdim bg-white text-ink focus:outline-none focus:border-teal">
    </label>
    <button type="submit" class="bg-ink text-paper px-7 py-4 rounded-full text-sm font-medium border-none cursor-pointer mt-2">Log in</button>
  </form>

  <p class="text-sm text-muted mt-6">Not a member yet? <a href="{% url 'signup' %}" class="text-teal font-medium">Join KAFUOSA</a></p>
</div>

{% endblock %}
