{% extends "base.html" %}{% block title %}My Profile{% endblock %}{% block content %}<div class="max-w-2xl mx-auto px-4 py-16"><h1 class="section-heading mb-4">My Profile</h1>{% if member %}<p class="text-gray-600">Status: <strong class="text-[#1a5c38]">{{ member.get_status_display }}</strong></p><p class="text-gray-600 mt-2">Tier: {{ member.get_tier_display }}</p>{% else %}<p class="text-gray-500">No member profile linked to your account.</p>{% endif %}<a href="/members/logout/" class="btn-primary mt-8 inline-block">Logout</a></div>{% endblock %}
