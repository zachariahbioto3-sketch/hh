{% extends "base.html" %}{% block title %}Alumni Dashboard{% endblock %}{% block content %}<div class="max-w-4xl mx-auto px-4 py-16"><h1 class="section-heading mb-8">Alumni Dashboard</h1><h2 class="font-bold text-lg mb-4 text-[#1a5c38]">Job Board</h2>{% for job in jobs %}<div class="border rounded-lg p-5 mb-3"><p class="font-bold">{{ job.title }}</p><p class="text-sm text-gray-500">{{ job.company }} &mdash; {{ job.location }}</p><a href="{{ job.application_link }}" class="text-[#e8a020] text-sm font-medium mt-2 inline-block" target="_blank">Apply Now &rarr;</a></div>{% empty %}<p class="text-gray-500">No job postings yet.</p>{% endfor %}</div>{% endblock %}
